      :root[data-theme="light"] { --sb-stage: #0a0a0b; }
      html, body { background: var(--sb-stage); margin: 0; }
    </style>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('sb.theme');
          var isDesktop = window.matchMedia('(min-width: 1024px)').matches;
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme;
          if (pref === 'light' || pref === 'carbon' || pref === 'midnight') {
            theme = pref;
          } else {
            theme = !sysDark ? 'light' : (isDesktop ? 'midnight' : 'carbon');
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) { /* ignore — fallback css :root handles it */ }
      })();
