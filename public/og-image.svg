<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f7931a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#c9740d"/>
    </linearGradient>
    <style>
      .display { font-family: 'Fraunces', Georgia, serif; }
      .sans { font-family: 'Geist', system-ui, sans-serif; }
      .mono { font-family: 'Geist Mono', ui-monospace, monospace; letter-spacing: -0.01em; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0a0a0b"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- grid pattern, subtle -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- bitcoin logo, top left -->
  <g transform="translate(80, 80)">
    <circle cx="32" cy="32" r="32" fill="url(#orange)"/>
    <path fill="#fff" d="M46.103 27.444c.637-4.258-2.605-6.547-7.038-8.074l1.438-5.768-3.511-.875-1.4 5.616c-.923-.23-1.871-.447-2.813-.662l1.41-5.653-3.51-.875-1.439 5.766c-.764-.174-1.514-.346-2.242-.527l.004-.018-4.842-1.209-.934 3.75s2.605.597 2.55.634c1.422.355 1.679 1.296 1.636 2.042l-1.638 6.571c.098.025.225.061.365.117-.117-.029-.242-.061-.371-.092l-2.296 9.205c-.174.432-.615 1.08-1.609.834.035.051-2.552-.637-2.552-.637l-1.743 4.019 4.569 1.139c.85.213 1.683.436 2.502.646l-1.453 5.835 3.508.875 1.439-5.772c.958.26 1.888.5 2.798.726l-1.434 5.745 3.511.875 1.453-5.823c5.987 1.133 10.489.676 12.384-4.739 1.527-4.36-.076-6.875-3.226-8.515 2.294-.529 4.022-2.038 4.483-5.155zm-8.022 11.249c-1.085 4.36-8.426 2.003-10.806 1.412l1.928-7.729c2.38.594 10.012 1.77 8.878 6.317zm1.086-11.312c-.99 3.966-7.1 1.951-9.082 1.457l1.748-7.01c1.982.494 8.365 1.416 7.334 5.553z"/>
    <text x="84" y="28" class="display" fill="#fff" font-size="28" font-weight="600" letter-spacing="-0.5">Stack &amp; Borrow</text>
    <text x="84" y="52" class="sans" fill="#fff" fill-opacity="0.5" font-size="13" font-weight="500" letter-spacing="2.5" text-transform="uppercase">KEEP YOUR SATS · FREE YOUR CASH</text>
  </g>

  <!-- main headline -->
  <text x="80" y="320" class="display" fill="#fff" font-size="76" font-weight="500" letter-spacing="-2">You keep</text>
  <text x="80" y="410" class="display" fill="#f7931a" font-size="92" font-weight="600" letter-spacing="-2.5">8 289 242 sats</text>

  <!-- tagline -->
  <text x="80" y="475" class="sans" fill="#fff" fill-opacity="0.7" font-size="22" font-weight="400">that you'd otherwise sell. The math, in your browser.</text>

  <!-- bottom strip with key features -->
  <g transform="translate(80, 540)">
    <text x="0" y="0" class="mono" fill="#f7931a" font-size="14" font-weight="500" letter-spacing="2" text-transform="uppercase">SATS-FIRST</text>
    <text x="180" y="0" class="mono" fill="#fff" fill-opacity="0.4" font-size="14" font-weight="500" letter-spacing="2">·</text>
    <text x="200" y="0" class="mono" fill="#f7931a" font-size="14" font-weight="500" letter-spacing="2" text-transform="uppercase">TAX-AWARE</text>
    <text x="370" y="0" class="mono" fill="#fff" fill-opacity="0.4" font-size="14" font-weight="500" letter-spacing="2">·</text>
    <text x="390" y="0" class="mono" fill="#f7931a" font-size="14" font-weight="500" letter-spacing="2" text-transform="uppercase">HONEST RANKINGS</text>
    <text x="640" y="0" class="mono" fill="#fff" fill-opacity="0.4" font-size="14" font-weight="500" letter-spacing="2">·</text>
    <text x="660" y="0" class="mono" fill="#f7931a" font-size="14" font-weight="500" letter-spacing="2" text-transform="uppercase">NO SIGNUP</text>
  </g>

  <!-- url, bottom right -->
  <text x="1120" y="585" class="mono" fill="#fff" fill-opacity="0.4" font-size="14" font-weight="500" text-anchor="end">stackandborrow.com</text>
